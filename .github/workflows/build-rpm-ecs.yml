name: Build CoovaChilli 1.8 RPM (ECS Fargate)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_DIR: terraform
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

jobs:
  # ─── 1. Terraform: ensure infra is up & capture outputs ────────────────────
  infra:
    name: Terraform – provision ECS infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      ecr_url:        ${{ steps.tf_out.outputs.ecr_url }}
      s3_bucket:      ${{ steps.tf_out.outputs.s3_bucket }}
      cluster_name:   ${{ steps.tf_out.outputs.cluster_name }}
      task_def_arn:   ${{ steps.tf_out.outputs.task_def_arn }}
      subnet_ids:     ${{ steps.tf_out.outputs.subnet_ids }}
      sg_id:          ${{ steps.tf_out.outputs.sg_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var='subnet_ids=${{ vars.SUBNET_IDS }}' \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="tf_state_bucket=${{ env.TF_STATE_BUCKET }}"

      - name: Capture Terraform outputs
        id: tf_out
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)"   >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)"     >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "task_def_arn=$(terraform output -raw ecs_task_definition_arn)" >> "$GITHUB_OUTPUT"
          echo "sg_id=$(terraform output -raw task_security_group_id)" >> "$GITHUB_OUTPUT"
          # Flatten subnet_ids list into comma-separated string for run-task
          echo "subnet_ids=$(terraform output -json subnet_ids | jq -r 'join(",")')" >> "$GITHUB_OUTPUT"

  # ─── 2. Build & push Docker image to ECR ───────────────────────────────────
  docker:
    name: Build & push builder image to ECR
    runs-on: ubuntu-latest
    needs: infra
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full=${{ needs.infra.outputs.ecr_url }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ needs.infra.outputs.ecr_url }}:${{ steps.meta.outputs.tag }}
            ${{ needs.infra.outputs.ecr_url }}:latest

  # ─── 3. Run ECS Fargate task & wait ────────────────────────────────────────
  build-rpm:
    name: Run ECS task – build RPM
    runs-on: ubuntu-latest
    needs: [infra, docker]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:            ${{ env.AWS_REGION }}

      # Re-register the task definition with the new image tag so ECS uses
      # the exact commit image we just pushed.
      - name: Register updated task definition
        id: register_task
        run: |
          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "${{ needs.infra.outputs.task_def_arn }}" \
            --query 'taskDefinition' --output json)

          NEW_IMAGE="${{ needs.infra.outputs.ecr_url }}:${{ needs.docker.outputs.image_tag }}"

          NEW_TASK_DEF=$(echo "$TASK_DEF_JSON" | jq \
            --arg img "$NEW_IMAGE" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
             | .containerDefinitions[0].image = $img')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"

      - name: Run ECS Fargate task
        id: run_task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ needs.infra.outputs.cluster_name }}" \
            --task-definition "${{ steps.register_task.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ needs.infra.outputs.subnet_ids }}],securityGroups=[${{ needs.infra.outputs.sg_id }}],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "task_arn=${TASK_ARN}" >> "$GITHUB_OUTPUT"
          echo "Launched ECS task: ${TASK_ARN}"

      - name: Wait for task to complete (up to 30 min)
        run: |
          TASK_ARN="${{ steps.run_task.outputs.task_arn }}"
          CLUSTER="${{ needs.infra.outputs.cluster_name }}"
          echo "Waiting for task ${TASK_ARN} to stop..."
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN"

      - name: Check task exit code
        run: |
          TASK_ARN="${{ steps.run_task.outputs.task_arn }}"
          CLUSTER="${{ needs.infra.outputs.cluster_name }}"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Container exit code: ${EXIT_CODE}"
          if [[ "$EXIT_CODE" != "0" ]]; then
            echo "::error::ECS task failed with exit code ${EXIT_CODE}."
            echo "Check CloudWatch logs at: /ecs/${{ needs.infra.outputs.cluster_name }}"
            exit 1
          fi

  # ─── 4. Download RPMs from S3 & publish GitHub Release ─────────────────────
  publish:
    name: Download RPMs & publish GitHub Release
    runs-on: ubuntu-latest
    needs: [infra, build-rpm]
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download RPMs from S3
        run: |
          mkdir -p artifacts
          aws s3 cp \
            "s3://${{ needs.infra.outputs.s3_bucket }}/rpms/" \
            artifacts/ \
            --recursive \
            --exclude "*" \
            --include "*.rpm"
          echo "Downloaded RPMs:"
          ls -lh artifacts/

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coova-chilli-centos6-rpms
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.8"
          if gh release view "$TAG" --repo ${{ github.repository }} &>/dev/null; then
            gh release upload "$TAG" artifacts/* \
              --repo ${{ github.repository }} --clobber
          else
            gh release create "$TAG" artifacts/* \
              --repo ${{ github.repository }} \
              --title "CoovaChilli 1.8 (CentOS 6 RPM – built on ECS Fargate)" \
              --notes "CoovaChilli 1.8 RPM built for CentOS 6 / EL6 using AWS ECS Fargate via Terraform." \
              --latest
          fi
